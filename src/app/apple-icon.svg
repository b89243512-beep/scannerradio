<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="100" fill="url(#bg)"/>
  <!-- Radio tower -->
  <rect x="230" y="240" width="40" height="140" rx="6" fill="white"/>
  <polygon points="250,120 280,240 220,240" fill="white"/>
  <circle cx="250" cy="180" r="10" fill="#2563eb"/>
  <!-- Signal waves -->
  <path d="M 170 170 Q 130 210 170 250" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 140 140 Q 80 210 140 280" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 330 170 Q 370 210 330 250" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 360 140 Q 420 210 360 280" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Pulse dot -->
  <circle cx="250" cy="180" r="6" fill="#ef4444"/>
</svg>
